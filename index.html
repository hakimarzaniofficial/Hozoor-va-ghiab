    <!-- Supabase Scripts (Module) -->
    <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm";

        const supabaseUrl = 'https://cycprryalibwwimjqjcp.supabase.co';
        const supabaseKey = 'sb_publishable_DGirk7FjKHnVIgX7jN1N8A_Z-mr05TO';
        const supabase = createClient(supabaseUrl, supabaseKey);

        window.cloudData = {
            supervisors: [], borrowItems: ['جاروبرقی', 'اتو', 'سشوار', 'کلید زاپاس'],
            students: {}, attendance: [], borrows: []
        };

        // توابع خطایابی پیشرفته
        const checkError = (error, type) => {
            if(error) {
                console.error("Supabase Error:", error);
                alert(`خطا در ذخیره ${type}!\nاحتمالاً کدهای SQL در سایت سوپابیس به درستی اجرا نشده‌اند.`);
            }

        async function fetchSettings() {
            const { data, error } = await supabase.from('settings').select('*').eq('id', 'config');
            if (data && data.length > 0) {
                window.cloudData.supervisors = data[0].data.supervisors || [];
                window.cloudData.borrowItems = data[0].data.borrowItems || window.cloudData.borrowItems;
            }
            window.updateShiftUI(); window.renderTab();
        }

        async function fetchStudents() {
            const { data } = await supabase.from('students').select('*').eq('id', 'list');
            if (data && data.length > 0) window.cloudData.students = data[0].data.list || {};
            window.renderTab();
        }

        async function fetchAttendance() {
            const { data } = await supabase.from('attendance').select('*');
            if (data) window.cloudData.attendance = data.map(d => ({ id: d.id, ...d.data }));
            window.renderTab();
        }

        async function fetchBorrows() {
            const { data } = await supabase.from('borrows').select('*');
            if (data) window.cloudData.borrows = data.map(d => ({ id: d.id, ...d.data }));
            window.renderTab();
        }

        async function initData() {
            await Promise.all([fetchSettings(), fetchStudents(), fetchAttendance(), fetchBorrows()]);
            document.getElementById('loader').style.display = 'none';
        }
        initData();

        supabase.channel('public-tables')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, fetchSettings)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'students' }, fetchStudents)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, fetchAttendance)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'borrows' }, fetchBorrows)
            .subscribe();

        window.updateCloudSettings = async () => {
            const { error } = await supabase.from('settings').upsert({ id: 'config', data: { supervisors: window.cloudData.supervisors, borrowItems: window.cloudData.borrowItems } });

            checkError(error, "حضور و غیاب");
        };
        window.addCloudBorrow = async (borrowObj) => {
            const { error } = await supabase.from('borrows').upsert({ id: borrowObj.id.toString(), data: borrowObj });
            checkError(error, "امانات");
        };
        window.updateCloudBorrow = async (id, updates) => {
            const existing = window.cloudData.borrows.find(b => b.id.toString() === id.toString());
            if (existing) {
                const newData = { ...existing, ...updates };
                const { error } = await supabase.from('borrows').upsert({ id: id.toString(), data: newData });
                checkError(error, "برگشت امانت");
            }
        };
    </script>

    <!-- UI Logic -->
    <script>
        const toPersianDigits = str => str.replace(/[0-9]/g, w => String.fromCharCode(w.charCodeAt(0) + 1728));
        const toEnglishDigits = str => str.replace(/[۰-۹]/g, w => String.fromCharCode(w.charCodeAt(0) - 1728));
        const getTodayStr = () => toEnglishDigits(new Intl.DateTimeFormat('fa-IR', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date())).replace(/\//g, '-');
        const formatTime = (ts) => ts ? new Date(ts).toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' }) : '-';
        
        setInterval(() => { document.getElementById('header-time').innerText = formatTime(Date.now()); }, 1000);
        document.getElementById('header-date').innerText = new Intl.DateTimeFormat('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' }).format(new Date());

        const CORRIDORS = [{id: 1, name: 'محمدی'}, {id: 2, name: 'رز'}, {id: 3, name: 'شقایق'}, {id: 4, name: 'نیلوفر'}];

        let state = {
            tab: 'attendance', shift: localStorage.getItem('my_shift') || '',
            corridor: 1, room: null, roomStatuses: {}, 
            signature: null, setCorridor: 1, setRoom: 1
        };

        window.updateShiftUI = () => {
            const supervisors = window.cloudData ? window.cloudData.supervisors : [];
            const select = document.getElementById('shift-select');
            const display = document.getElementById('shift-display');
            const bar = document.getElementById('shift-bar');

            select.innerHTML = '<option value="" disabled selected>انتخاب سرپرست</option>';
            supervisors.forEach(s => select.innerHTML += `<option value="${s}">${s}</option>`);

            if (state.shift && supervisors.includes(state.shift)) {
                select.value = state.shift;
                display.innerHTML = `شیفت امروز: <span class="bg-green-200 px-2 py-0.5 rounded text-green-900">${state.shift}</span>`;
                bar.className = "p-3 rounded-lg flex justify-between items-center border shadow-sm bg-green-50 border-green-300";
                display.className = "text-green-800";
            } else {
                state.shift = '';
                display.innerText = "شیفت تعیین نشده!";
                bar.className = "p-3 rounded-lg flex justify-between items-center border shadow-sm bg-yellow-50 border-yellow-300 animate-pulse";
                display.className = "text-yellow-800";
            }
        }

        window.changeShift = (val) => { state.shift = val; localStorage.setItem('my_shift', val); window.updateShiftUI(); }

        window.switchTab = (tabName) => {
            state.tab = tabName;
            const tabs = ['attendance', 'borrow', 'report', 'settings'];
            tabs.forEach(t => {
                const btn = document.getElementById('tab-' + t);
                if (t === tabName) btn.className = "flex-1 py-3 text-center transition-colors text-blue-600 font-bold border-b-2 border-blue-600";
                else btn.className = "flex-1 py-3 text-center transition-colors text-gray-500 hover:text-blue-500 border-b-2 border-transparent";
            });
            window.renderTab();
        }

        window.renderTab = () => {
            if(!window.cloudData) return; 
            const content = document.getElementById('app-content');
            if (state.tab === 'attendance') content.innerHTML = viewAttendance();
            else if (state.tab === 'borrow') content.innerHTML = viewBorrow();
            else if (state.tab === 'report') content.innerHTML = viewReport();
            else if (state.tab === 'settings') content.innerHTML = viewSettings();
        }

        function viewAttendance() {
            let html = `<div class="bg-white p-4 rounded-lg shadow-sm border mb-4 fade-in"><h3 class="text-xs font-bold text-gray-500 mb-2">۱. راهرو:</h3><div class="grid grid-cols-2 gap-2">`;
            CORRIDORS.forEach(c => { html += `<button onclick="selectCorridor(${c.id})" class="py-2 rounded-lg font-bold text-xs border transition-colors ${state.corridor === c.id ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-gray-50 text-gray-700'}">${c.name}</button>`; });
            html += `</div></div><div class="bg-white p-4 rounded-lg shadow-sm border mb-4 fade-in"><h3 class="text-xs font-bold text-gray-500 mb-2">۲. اتاق:</h3><div class="grid grid-cols-6 sm:grid-cols-11 gap-1.5">`;
            
            const today = getTodayStr();
            const attendanceDB = window.cloudData.attendance;
            for(let r=1; r<=11; r++) {
                const uId = `${state.corridor}-${r}`;
                const isCheckedToday = attendanceDB.some(rec => rec.roomId === uId && rec.date === today);
                let btnClass = state.room === r ? 'bg-blue-800 text-white ring-1 ring-blue-400 transform scale-110' : (isCheckedToday ? 'bg-green-100 text-green-800 border-green-300' : 'bg-white border-gray-300 text-gray-700');
                html += `<button onclick="selectRoom(${r})" class="aspect-square flex items-center justify-center rounded border font-bold text-xs transition-all ${btnClass}">${toPersianDigits(r.toString())}</button>`;
            }
            html += `</div></div>`;

            if(state.room) {
                const uId = `${state.corridor}-${state.room}`;
                const roomStudents = window.cloudData.students[uId] || [];
                if(Object.keys(state.roomStatuses).length === 0) {
                    const existingRecord = attendanceDB.find(rec => rec.roomId === uId && rec.date === today);
                    if(existingRecord) state.roomStatuses = {...existingRecord.statuses};
                    else roomStudents.forEach(s => state.roomStatuses[s.id] = 'present');
                }

                html += `<div class="bg-blue-50 p-3 rounded-lg border border-blue-200 fade-in shadow-inner"><h3 class="font-bold text-blue-900 text-sm mb-3 text-center border-b border-blue-200 pb-2">ثبت وضعیت اتاق ${toPersianDigits(state.room.toString())}</h3><div class="space-y-2">`;
                if(roomStudents.length === 0) { html += `<div class="text-xs text-center text-gray-500 py-6 border border-dashed rounded bg-white">دانشجویی در این اتاق ثبت نشده است.<br><span class="text-[10px] text-blue-500 mt-1 block">جهت ثبت نام به بخش تنظیمات بروید.</span></div>`; } 
                else {
                    roomStudents.forEach(student => {
                        const st = state.roomStatuses[student.id] || 'present';
                        html += `<div class="bg-white p-1.5 rounded flex flex-row justify-between items-center border border-gray-200 shadow-sm"><span class="font-bold text-xs text-gray-800 truncate pr-1" style="max-width: 40%;">${student.name}</span><div class="flex gap-1 bg-gray-100 p-1 rounded border" style="width: 60%; max-width: 180px;"><label class="radio-btn flex-1"><input type="radio" name="${student.id}" class="hidden" onchange="setStatus('${student.id}', 'present')" ${st==='present'?'checked':''}><div class="present py-1.5 text-[10px] text-center rounded text-gray-500 border border-transparent transition-colors cursor-pointer">حاضر</div></label><label class="radio-btn flex-1"><input type="radio" name="${student.id}" class="hidden" onchange="setStatus('${student.id}', 'absent')" ${st==='absent'?'checked':''}><div class="absent py-1.5 text-[10px] text-center rounded text-gray-500 border border-transparent transition-colors cursor-pointer">غایب</div></label><label class="radio-btn flex-1"><input type="radio" name="${student.id}" class="hidden" onchange="setStatus('${student.id}', 'leave')" ${st==='leave'?'checked':''}><div class="leave py-1.5 text-[10px] text-center rounded text-gray-500 border border-transparent transition-colors cursor-pointer">مرخصی</div></label></div></div>`;
                    });
                }
                html += `</div>`;
                if(roomStudents.length > 0) { html += `<button onclick="saveAttendance()" class="w-full bg-blue-700 text-white py-3 rounded-lg mt-4 font-bold text-sm shadow-md"><i class="fa-solid fa-save ml-1"></i> ثبت در سیستم ابری</button>`; }
                html += `</div>`;
            }
            return html;
        }

        window.selectCorridor = (id) => { state.corridor = id; state.room = null; window.renderTab(); };
        window.selectRoom = (num) => { state.room = num; state.roomStatuses = {}; window.renderTab(); };
        window.setStatus = (sId, status) => { state.roomStatuses[sId] = status; };
        
        window.saveAttendance = () => {
            if(!state.shift) return alert('لطفاً ابتدا از نوار بالا سرپرست شیفت را مشخص کنید!');
            const uId = `${state.corridor}-${state.room}`;
            const today = getTodayStr();
            const dataObj = { date: today, roomId: uId, roomNum: state.room, corridorName: CORRIDORS.find(c=>c.id===state.corridor).name, statuses: state.roomStatuses, supervisor: state.shift, timestamp: Date.now() };
            
            const existingIdx = window.cloudData.attendance.findIndex(a => a.roomId === uId && a.date === today);
            if(existingIdx > -1) window.cloudData.attendance[existingIdx] = {id: `${uId}_${today}`, ...dataObj};
            else window.cloudData.attendance.push({id: `${uId}_${today}`, ...dataObj});
            
            window.renderTab(); 
            window.updateCloudAttendance(uId, today, dataObj);
            alert('در سرور ابری ثبت شد!');
        };

        function viewBorrow() {
            const borrows = window.cloudData.borrows.filter(b => b.status === 'active').sort((a,b)=>b.time - a.time);
            return `<div class="fade-in space-y-4"><div class="bg-white p-4 rounded-lg shadow-sm border"><h2 class="font-bold text-sm border-b pb-2 mb-3">ثبت امانت جدید</h2><div class="space-y-3"><select id="b-item" class="w-full border rounded p-2 text-sm bg-gray-50 outline-none font-bold"><option value="" disabled selected>انتخاب وسیله...</option>${window.cloudData.borrowItems.map(i => `<option value="${i}">${i}</option>`).join('')}</select><div class="grid grid-cols-2 gap-2"><select id="b-corridor" onchange="b_updateRooms()" class="border rounded p-2 text-sm bg-gray-50 outline-none"><option value="" disabled selected>انتخاب راهرو</option>${CORRIDORS.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}</select><select id="b-room" onchange="b_updateStudents()" class="border rounded p-2 text-sm bg-gray-50 outline-none"><option value="" disabled selected>ابتدا راهرو...</option></select></div><select id="b-student" class="w-full border rounded p-2 text-sm bg-gray-50 outline-none"><option value="" disabled selected>ابتدا اتاق...</option></select><button onclick="addBorrow()" class="w-full bg-indigo-600 text-white py-2.5 rounded font-bold text-sm"><i class="fa-solid fa-cloud-arrow-up ml-1"></i> تحویل دادم</button></div></div><div class="bg-white p-4 rounded-lg shadow-sm border"><h2 class="font-bold text-sm border-b pb-2 mb-3">وسایل در دست دانشجویان (${borrows.length})</h2><div class="space-y-2">${borrows.length === 0 ? '<div class="text-xs text-center text-gray-400 py-4">موردی نیست.</div>' : borrows.map(b => `<div class="bg-orange-50 border border-orange-100 p-2.5 rounded flex justify-between items-center gap-2"><div><div class="font-bold text-sm text-orange-900">${b.item}</div><div class="text-[10px] text-gray-700 mt-1">${b.name} (راهرو ${b.cName} - اتاق ${toPersianDigits(b.room.toString())})</div><div class="text-[10px] text-gray-500 mt-0.5"><i class="fa-regular fa-clock"></i> ${formatTime(b.time)} | سرپرست: ${b.supervisor}</div></div><button onclick="returnBorrow(${b.id})" class="bg-white border border-green-500 text-green-700 px-3 py-1.5 rounded text-xs font-bold whitespace-nowrap">پس گرفتم</button></div>`).join('')}</div></div></div>`;
        }

        window.b_updateRooms = () => {
            const cId = document.getElementById('b-corridor').value;
            let html = '<option value="" disabled selected>انتخاب اتاق</option>';
            if(cId) { for(let r=1; r<=11; r++) html += `<option value="${r}">اتاق ${toPersianDigits(r.toString())}</option>`; }
            document.getElementById('b-room').innerHTML = html; document.getElementById('b-student').innerHTML = '<option value="" disabled selected>ابتدا اتاق را مشخص کنید</option>';
        };
        window.b_updateStudents = () => {
            const cId = document.getElementById('b-corridor').value; const rId = document.getElementById('b-room').value;
            let html = '<option value="" disabled selected>انتخاب دانشجو</option>';
            if(cId && rId) {
                const students = window.cloudData.students[`${cId}-${rId}`] || [];
                if(students.length === 0) html = '<option value="" disabled selected>دانشجویی در این اتاق نیست</option>';
                students.forEach(s => html += `<option value="${s.name}">${s.name}</option>`);
            }
            document.getElementById('b-student').innerHTML = html;
        };

        window.addBorrow = () => {
            if(!state.shift) return alert('سرپرست شیفت مشخص نیست!');
            const item = document.getElementById('b-item') ? document.getElementById('b-item').value : null;
            const cId = document.getElementById('b-corridor').value; const room = document.getElementById('b-room').value; const name = document.getElementById('b-student').value;
            if(!item || !cId || !room || !name) return alert('لطفاً همه کادرها را به درستی انتخاب کنید.');
            const borrowObj = { id: Date.now(), item, cName: CORRIDORS.find(c => c.id == cId).name, room, name, supervisor: state.shift, status: 'active', time: Date.now() };
            window.cloudData.borrows.push(borrowObj);
            window.renderTab();
            window.addCloudBorrow(borrowObj);
        };
        window.returnBorrow = (id) => {
            const bIndex = window.cloudData.borrows.findIndex(b => b.id.toString() === id.toString());
            if(bIndex > -1) { window.cloudData.borrows[bIndex].status = 'returned'; window.cloudData.borrows[bIndex].returnTime = Date.now(); window.renderTab(); window.updateCloudBorrow(id, { status: 'returned', returnTime: window.cloudData.borrows[bIndex].returnTime }); }
        };
